
<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Offerist</title>
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <link rel="stylesheet" href="//igordos.github.io/productfront/styles/index.css">
  <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/font-awesome/4.5.0/css/font-awesome.min.css">
  <link rel="stylesheet" type="text/css" href="https://connoratherton.com/assets/css/vendor/loaders.css.min.css"/>
  <!--[if lt IE 9]>
  <script src="https://oss.maxcdn.com/html5shiv/3.7.2/html5shiv.min.js"></script>
  <script src="https://oss.maxcdn.com/respond/1.4.2/respond.min.js"></script>
  <![endif]-->
  <style>
  .loader {
    position: absolute;
    z-index: 1;
    width: 600px;
    height: 300px;
    background: #fff;
    opacity: 0.7
  }
  .spinner {
    width: 60px;
    height: 60px;
    margin: 60px;
    animation: rotate 1.4s infinite ease-in-out, background 1.4s infinite ease-in-out alternate;
  }

  @keyframes rotate {
    0% {
      transform: perspective(120px) rotateX(0deg) rotateY(0deg);
    }
    50% {
      transform: perspective(120px) rotateX(-180deg) rotateY(0deg);
    }
    100% {
      transform: perspective(120px) rotateX(-180deg) rotateY(-180deg);
    }
  }
  @keyframes background {
    0% {
    background-color: #27ae60;
    }
    50% {
      background-color: #9b59b6;
    }
    100% {
      background-color: #c0392b;
    }
  }
  </style>
</head>
<body class="body-wrapper">
  <div id="app" ></div>
  <script src="./scripts/commons.js"></script>
  <script src="./scripts/index.js"></script>
</body>
</html>
